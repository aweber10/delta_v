<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#020408" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Delta V" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <title>Delta V</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020408;
      color: #f4f7fb;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020408;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #020408;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 38%, rgba(45, 116, 162, 0.26), transparent 34%),
        rgba(2, 4, 8, 0.86);
    }

    .overlay[hidden] {
      display: none;
    }

    .start-panel {
      width: min(420px, 100%);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #8fd0ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 18vw, 76px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .mission {
      margin: 18px auto 28px;
      max-width: 320px;
      color: #c8d3df;
      font-size: 16px;
      line-height: 1.45;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      padding: 0 20px;
      background: #f4f7fb;
      color: #07111b;
      font: inherit;
      font-weight: 800;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #f4f7fb;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="overlay" id="startScreen">
    <section class="start-panel" aria-labelledby="gameTitle">
      <p class="eyebrow">Level 1</p>
      <h1 id="gameTitle">Delta V</h1>
      <p class="mission">Transportiere die Fracht von Station A nach Station B.</p>
      <div class="actions">
        <button id="startButton" type="button">Start</button>
        <button class="secondary" id="muteButton" type="button" aria-pressed="false">Sound an</button>
      </div>
    </section>
  </div>
  <div class="overlay" id="levelCompleteScreen" hidden>
    <section class="start-panel" aria-labelledby="completeTitle">
      <p class="eyebrow">Level 1 abgeschlossen</p>
      <h1 id="completeTitle">Transport erfolgreich</h1>
      <p class="mission">Die erste Lieferung ist angekommen.</p>
      <div class="actions">
        <button id="restartButton" type="button">Neu starten</button>
      </div>
    </section>
  </div>
  <script type="module" src="./js/main.js?v=21"></script>
</body>
</html>
